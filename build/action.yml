name: 'Build project'
description: 'Build a LabVIEW project and package outputs'
inputs:
  relative_path:
    description: 'Relative path containing the LabVIEW project.'
    required: true
  major:
    description: 'Major version component.'
    required: true
  minor:
    description: 'Minor version component.'
    required: true
  patch:
    description: 'Patch version component.'
    required: true
  build:
    description: 'Build number.'
    required: true
  commit:
    description: 'Commit identifier.'
    required: true
  labview_minor_revision:
    description: 'LabVIEW minor revision.'
    required: true
  company_name:
    description: 'Company name for the build.'
    required: true
  author_name:
    description: 'Author name for the build.'
    required: true
  gcli_path:
    description: 'Optional path to the g-cli executable.'
    required: false
  working_directory:
    description: 'Working directory where the action will run.'
    required: false
  log_level:
    description: 'Verbosity level (ERROR|WARN|INFO|DEBUG).'
    default: 'INFO'
    required: false
  dry_run:
    description: 'If true, simulate the action without side effects.'
    default: false
    required: false
runs:
  using: 'composite'
  steps:
    - name: Dispatch build
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        $args = @{
          RelativePath         = '${{ inputs.relative_path }}'
          Major                = [int]'${{ inputs.major }}'
          Minor                = [int]'${{ inputs.minor }}'
          Patch                = [int]'${{ inputs.patch }}'
          Build                = [int]'${{ inputs.build }}'
          Commit               = '${{ inputs.commit }}'
          LabVIEWMinorRevision = '${{ inputs.labview_minor_revision }}'
          CompanyName          = '${{ inputs.company_name }}'
          AuthorName           = '${{ inputs.author_name }}'
        }
        if ('${{ inputs.gcli_path }}') { $args['gcliPath'] = '${{ inputs.gcli_path }}' }
        $params = @{
          ActionName = 'build'
          ArgsJson   = $args
          LogLevel   = '${{ inputs.log_level }}'
        }
        if ('${{ inputs.dry_run }}' -eq 'true') { $params['DryRun'] = $true }
        if ('${{ inputs.working_directory }}') { $params['WorkingDirectory'] = '${{ inputs.working_directory }}' }
        $script = Join-Path $env:GITHUB_ACTION_PATH '..' 'actions' 'Invoke-OSAction.ps1'
        & $script @params
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
