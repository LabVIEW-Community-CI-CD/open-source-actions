name: 'Open Source LabVIEW Actions'
description: 'Composite action to dispatch LabVIEW CI/CD tasks through a unified PowerShell interface.'
inputs:
  action_name:
    description: 'Name of the action to execute (e.g. run-unit-tests).'
    required: true
    type: string
  args_json:
    description: 'JSON string of arguments for the selected action.'
    required: false
    default: '{}'
    type: string
  args_yaml:
    description: 'YAML string of arguments for the selected action. Overrides args_json when set.'
    required: false
    default: ''
    type: string
  working_directory:
    description: 'Working directory where the action will run.'
    required: false
    type: string
  log_level:
    description: 'Verbosity level (ERROR|WARN|INFO|DEBUG).'
    required: false
    default: 'INFO'
    type: string
  dry_run:
    description: 'If true, simulate the action without side effects.'
    required: false
    default: false
    type: boolean
  describe:
    description: 'If true, print a description of the action before executing.'
    required: false
    default: false
    type: boolean
runs:
  using: 'composite'
  steps:
    - name: Invoke unified PowerShell action
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'

        # Prefer YAML args when provided; otherwise fall back to JSON.
        $yaml = @'
        ${{ inputs.args_yaml }}
        '@

        $params = @{
          ActionName = '${{ inputs.action_name }}'
          LogLevel   = '${{ inputs.log_level }}'
        }

        if ($yaml.Trim()) {
          try {
            $params['ArgsYaml'] = ConvertFrom-Yaml -Yaml $yaml -ErrorAction Stop
          }
          catch {
            throw "args_yaml is not valid YAML: $($_.Exception.Message)"
          }
        }
        else {
          # Capture JSON exactly as provided by the caller, without quoting/escaping issues.
          $json = @'
          ${{ inputs.args_json }}
          '@
          $params['ArgsJson'] = $json
        }

        if ('${{ inputs.working_directory }}' -ne '') {
          $params['WorkingDirectory'] = '${{ inputs.working_directory }}'
        }
        if ('${{ inputs.dry_run }}' -eq 'true') {
          $params['DryRun'] = $true
        }

        # Locate the dispatcher script relative to this repository root.
        $script = Join-Path $env:GITHUB_ACTION_PATH 'actions' 'Invoke-OSAction.ps1'

        if ('${{ inputs.describe }}' -eq 'true') {
          try {
            & $script -Describe '${{ inputs.action_name }}'
          } catch {
            Write-Host 'Describe command failed but continuing.'
          }
        }

        & $script @params
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
