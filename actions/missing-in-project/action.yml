name: 'Check missing project items'
description: 'Scan a LabVIEW project for missing items'
inputs:
  lv_version:
    description: 'LabVIEW version to use.'
    required: true
  arch:
    description: 'Target architecture (32 or 64).'
    required: true
  project_file:
    description: 'Path to the LabVIEW project (.lvproj).'
    required: true
  gcli_path:
    description: 'Optional path to the g-cli executable.'
    required: false
  working_directory:
    description: 'Working directory where the action will run.'
    required: false
  log_level:
    description: 'Verbosity level (ERROR|WARN|INFO|DEBUG).'
    default: 'INFO'
    required: false
  dry_run:
    description: 'If true, simulate the action without side effects.'
    default: false
    required: false
runs:
  using: 'composite'
  steps:
    - name: Dispatch missing-in-project
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        $args = @{
          LVVersion   = '${{ inputs.lv_version }}'
          Arch        = '${{ inputs.arch }}'
          ProjectFile = '${{ inputs.project_file }}'
        }
        if ('${{ inputs.gcli_path }}') { $args['gcliPath'] = '${{ inputs.gcli_path }}' }
        $params = @{
          ActionName = 'missing-in-project'
          ArgsYaml   = $args
          LogLevel   = '${{ inputs.log_level }}'
        }
        if ('${{ inputs.dry_run }}' -eq 'true') { $params['DryRun'] = $true }
        if ('${{ inputs.working_directory }}') { $params['WorkingDirectory'] = '${{ inputs.working_directory }}' }
        $script = Join-Path $env:GITHUB_ACTION_PATH '..' 'Invoke-OSAction.ps1'
        & $script @params
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
