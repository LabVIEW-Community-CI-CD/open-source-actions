name: 'Unified LabVIEW Action'
description: 'Composite action to dispatch LabVIEW CI/CD tasks through a unified PowerShell interface.'
inputs:
  action_name:
    description: 'Name of the action to execute (e.g. run-unit-tests).'
    required: true
    type: string
  args_json:
    description: 'JSON string of arguments for the selected action.'
    required: false
    default: '{}'
    type: string
  working_directory:
    description: 'Working directory where the action will run.'
    required: false
    type: string
  log_level:
    description: 'Verbosity level (ERROR|WARN|INFO|DEBUG).'
    required: false
    default: 'INFO'
    type: string
  dry_run:
    description: 'If true, simulate the action without side effects.'
    required: false
    default: false
    type: boolean
runs:
  using: 'composite'
  steps:
    - name: Invoke unified PowerShell action
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'

        # Capture JSON exactly as provided by the caller, without quoting/escaping issues.
        $json = @'
        ${{ inputs.args_json }}
        '@

        # Build parameters via hashtable splatting to avoid fragile CLI string quoting.
        $params = @{
          ActionName = '${{ inputs.action_name }}'
          ArgsJson   = $json
          LogLevel   = '${{ inputs.log_level }}'
        }

        if ('${{ inputs.working_directory }}' -ne '') {
          $params['WorkingDirectory'] = '${{ inputs.working_directory }}'
        }
        if (${{ inputs.dry_run }}) {
          $params['DryRun'] = $true
        }

        # Locate the dispatcher script relative to this action folder.
        $script = Join-Path $env:GITHUB_ACTION_PATH '..' 'Invoke-OSAction.ps1'

        & $script @params
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
