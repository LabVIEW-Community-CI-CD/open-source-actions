name: "LabVIEW CI Task Coordinator"
description: "Composite action to run a specified LabVIEW CI sub-action (build, test, etc.) based on the 'task' input."
author: "LabVIEW Community CI/CD"
inputs:
  task:
    description: "Name of the task to run (e.g. 'project-build', 'missing-in-project', 'run-unit-tests', 'apply-vipc')."
    required: true
  lv-ver:
    description: "LabVIEW version (four-digit year, e.g. '2021')."
    required: true
  arch:
    description: "LabVIEW bitness (32 or 64)."
    required: false
    default: "64"
  project-file:
    description: "Path to the LabVIEW project (.lvproj) to use. Defaults to 'main.lvproj'."
    required: false
    default: "main.lvproj"
  vipc-file:
    description: "Path to a VIPM package configuration (.vipc) file (used when task is 'apply-vipc')."
    required: false
  build-spec:
    description: "Name of a specific build specification to build (used when task is 'project-build'; if not provided, all build specs in the project may be built)."
    required: false

runs:
  using: "composite"
  steps:
    - name: Validate task input
      shell: bash
      run: |
        set -euo pipefail
        case "${{ inputs.task }}" in 
          project-build|missing-in-project|run-unit-tests|apply-vipc) 
            echo "Running task '${{ inputs.task }}'..."
            ;; 
          *) 
            echo "Error: Unknown task '${{ inputs.task }}'. Supported tasks are: project-build, missing-in-project, run-unit-tests, apply-vipc." >&2
            exit 1 
            ;; 
        esac

    - name: Run Project Build
      if: ${{ inputs.task == 'project-build' }}
      uses: LabVIEW-Community-CI-CD/open-source-actions/actions/project-build@main
      with:
        lv-ver: ${{ inputs.lv-ver }}
        arch: ${{ inputs.arch }}
        project-file: ${{ inputs['project-file'] }}
        build-spec: ${{ inputs['build-spec'] }}

    - name: Run Missing-In-Project Check
      if: ${{ inputs.task == 'missing-in-project' }}
      uses: ni/missing-in-project-action@main
      with:
        lv-ver: ${{ inputs.lv-ver }}
        arch: ${{ inputs.arch }}
        project-file: ${{ inputs['project-file'] }}

    - name: Run Unit Tests
      if: ${{ inputs.task == 'run-unit-tests' }}
      uses: ni/run-unit-tests-action@main
      with:
        lv-ver: ${{ inputs.lv-ver }}
        arch: ${{ inputs.arch }}
        project-file: ${{ inputs['project-file'] }}

    - name: Apply VIPC Dependencies
      if: ${{ inputs.task == 'apply-vipc' }}
      uses: LabVIEW-Community-CI-CD/open-source-actions/actions/apply-vipc@main
      with:
        lv-ver: ${{ inputs.lv-ver }}
        arch: ${{ inputs.arch }}
        vipc-file: ${{ inputs['vipc-file'] }}
