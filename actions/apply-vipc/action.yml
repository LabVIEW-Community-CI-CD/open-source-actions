name: 'Apply VI Package Configuration'
description: 'Apply a VI Package Configuration (.vipc) file to a LabVIEW installation'
inputs:
  minimum_supported_lv_version:
    description: 'Minimum LabVIEW version supported.'
    required: true
  vip_lv_version:
    description: 'LabVIEW version associated with the VI Package.'
    required: true
  supported_bitness:
    description: '"32" or "64" bitness of LabVIEW.'
    required: true
  relative_path:
    description: 'Relative path containing the LabVIEW project.'
    required: true
  vipc_path:
    description: 'Path to the VIPC file.'
    required: false
  gcli_path:
    description: 'Optional path to the g-cli executable.'
    required: false
  working_directory:
    description: 'Working directory where the action will run.'
    required: false
  log_level:
    description: 'Verbosity level (ERROR|WARN|INFO|DEBUG).'
    default: 'INFO'
    required: false
  dry_run:
    description: 'If true, simulate the action without side effects.'
    default: false
    required: false
runs:
  using: 'composite'
  steps:
    - name: Dispatch apply-vipc
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        $args = @{
          MinimumSupportedLVVersion = '${{ inputs.minimum_supported_lv_version }}'
          VIP_LVVersion             = '${{ inputs.vip_lv_version }}'
          SupportedBitness          = '${{ inputs.supported_bitness }}'
          RelativePath              = '${{ inputs.relative_path }}'
        }
        if ('${{ inputs.vipc_path }}') { $args['VIPCPath'] = '${{ inputs.vipc_path }}' }
        if ('${{ inputs.gcli_path }}') { $args['gcliPath'] = '${{ inputs.gcli_path }}' }
        $params = @{
          ActionName = 'apply-vipc'
          ArgsYaml   = $args
          LogLevel   = '${{ inputs.log_level }}'
        }
        if ('${{ inputs.dry_run }}' -eq 'true') { $params['DryRun'] = $true }
        if ('${{ inputs.working_directory }}') { $params['WorkingDirectory'] = '${{ inputs.working_directory }}' }
        $script = Join-Path $env:GITHUB_ACTION_PATH '..' 'Invoke-OSAction.ps1'
        & $script @params
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
