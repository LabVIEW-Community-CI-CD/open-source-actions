name: Docs Lint

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'README.md'

jobs:
  lint-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Lint documentation
        shell: pwsh
        run: scripts/lint-docs.ps1
