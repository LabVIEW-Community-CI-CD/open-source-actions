name: CI

on:
  push:
    branches: [actions]
  pull_request:
    branches: [actions]

jobs:
  node-ci:
    runs-on: ubuntu-24.04
    env:
      # Summary artifacts are emitted under artifacts/<os>.
      # This job always runs on Linux, so the directory is fixed.
      ARTIFACT_DIR: artifacts/linux
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm run check:node
      - run: npm install
      - run: npm run link:check
      - run: npm run test:ci
      - run: npm run derive:registry
      - run: npm run generate:summary
        env:
          TEST_RESULTS_GLOB: test-results/*junit*.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: traceability
          path: ${{ env.ARTIFACT_DIR }}/traceability.*
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: action-docs
          path: ${{ env.ARTIFACT_DIR }}/action-docs.*
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: evidence
          path: ${{ env.ARTIFACT_DIR }}/evidence/**
          if-no-files-found: ignore

  ps-ci:
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            runs-on: ubuntu-24.04
            runner_type: default
          - os: windows-latest
            runs-on: windows-latest
            runner_type: integration
    runs-on: ${{ matrix.runs-on }}
    env:
      RUNNER_TYPE: ${{ matrix.runner_type }}
    steps:
      - uses: actions/checkout@v4
        if: matrix.os != 'windows-latest'
      - name: Install PowerShell 7.5.1 (Ubuntu)
        if: matrix.os == 'ubuntu-24.04'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://github.com/PowerShell/PowerShell/releases/download/v7.5.1/powershell_7.5.1-1.deb_amd64.deb -O /tmp/powershell.deb
          sudo dpkg -i /tmp/powershell.deb
      - name: Install PowerShell 7.5.1 (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $url = 'https://github.com/PowerShell/PowerShell/releases/download/v7.5.1/PowerShell-7.5.1-win-x64.msi'
          $msi = "$env:TEMP\pwsh.msi"
          Invoke-WebRequest -Uri $url -OutFile $msi
          Start-Process msiexec -Wait -ArgumentList '/i', $msi, '/qn', '/norestart'
      - name: Capture setup info
        shell: pwsh
        run: |
          $data = [ordered]@{
            'Current runner version' = $env:RUNNER_VERSION
            'Runner Image'          = $env:ImageOS
            'ImageVersion'          = $env:ImageVersion
            'RUNNER_NAME'           = $env:RUNNER_NAME
            'RUNNER_OS'             = $env:RUNNER_OS
            'RUNNER_ARCH'           = $env:RUNNER_ARCH
          }
          $file = "setup-info-${{ matrix.os }}.md"
          "was captured from the set up job." | Out-File -FilePath $file -Encoding utf8
          foreach ($k in $data.Keys) {
            if ($data[$k]) {
              "${k}: $($data[$k])" | Out-File -FilePath $file -Encoding utf8 -Append
            }
          }
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: setup-info-${{ matrix.os }}
          path: setup-info-${{ matrix.os }}.md
      - name: Install Pester
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name Pester |
                    Where-Object { $_.Version -ge [Version]'5.0.0' })) {
            Remove-Module Pester -ErrorAction SilentlyContinue
            Install-Module -Name Pester -MinimumVersion 5.0.0 -Scope CurrentUser -Force -SkipPublisherCheck
          }
      - name: Validate native YAML parsing
        if: matrix.runner_type == 'integration'
        shell: pwsh
        run: |
          $parsed = ConvertFrom-Yaml 'a: 1'
          if ($parsed.a -ne 1) { throw 'YAML parsing failed' }
      - name: Run Pester
        shell: pwsh
        run: |
          if (Test-Path "tests/pester") {
            Import-Module Pester -MinimumVersion 5.0.0
            $cfg = New-PesterConfiguration
            $cfg.Run.Path = './tests/pester'
            $cfg.TestResult.Enabled = $false
            $cfg.Run.Exit = $true
            Invoke-Pester -Configuration $cfg
          }
      - uses: actions/upload-artifact@v4
        if: matrix.os != 'windows-latest' && always()
        with:
          name: pester-junit-${{ matrix.os }}
          path: pester-results/pester-junit.xml
          if-no-files-found: error

  report:
    needs: [node-ci, ps-ci]
    runs-on: ubuntu-24.04
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm run check:node
      - run: npm install
      - uses: actions/download-artifact@v4
        with:
          path: ./downloaded
      - run: npm run derive:registry
      - run: npm run generate:summary
        env:
          TEST_RESULTS_GLOBS: |
            downloaded/test-results/**/*junit*.xml
            downloaded/pester-junit-*/pester-junit.xml
          REQ_MAPPING_FILE: requirements.json
          DISPATCHER_REGISTRY: dispatchers.json
          EVIDENCE_DIR: test-screenshots
      - run: npx tsx scripts/print-pester-traceability.ts >> "$GITHUB_STEP_SUMMARY"
