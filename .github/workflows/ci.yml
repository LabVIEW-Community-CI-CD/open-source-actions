name: CI

on:
  push:
    branches: [actions]
  pull_request:
    branches: [actions]

jobs:
  node-ci:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm run check:node
      - run: npm install
      - run: npm run test:ci
      - run: npm run derive:registry
      - run: npm run generate:summary
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: traceability
          path: artifacts/traceability.*
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: action-docs
          path: artifacts/action-docs.*
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: evidence
          path: artifacts/evidence/**
          if-no-files-found: ignore

  ps-ci:
    strategy:
      matrix:
        os: [ubuntu-24.04, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Pester
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name Pester |
                    Where-Object { $_.Version -ge [Version]'5.0.0' })) {
            Remove-Module Pester -ErrorAction SilentlyContinue
            Install-Module -Name Pester -MinimumVersion 5.0.0 -Scope CurrentUser -Force -SkipPublisherCheck
          }
      - name: Run Pester
        shell: pwsh
        run: |
          if (Test-Path "tests/pester") {
            $OutDir = Join-Path $env:GITHUB_WORKSPACE 'pester-results'
            New-Item -ItemType Directory -Force -Path $OutDir | Out-Null
            Import-Module Pester -MinimumVersion 5.0.0
            $cfg = [PesterConfiguration]::Default
            $cfg.Run.Path = './tests/pester'
            $cfg.Run.Exit = $true
            $cfg.TestResult.Enabled = $true
            $cfg.TestResult.OutputFormat = 'JUnitXml'
            $cfg.TestResult.OutputPath = (Join-Path $OutDir 'pester-junit.xml')
            Invoke-Pester -Configuration $cfg
          }
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pester-junit-${{ matrix.os }}
          path: pester-results/pester-junit.xml
          if-no-files-found: error

  report:
    needs: [node-ci, ps-ci]
    runs-on: ubuntu-24.04
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm run check:node
      - run: npm install
      - run: npm run test:ci
      - uses: actions/download-artifact@v4
        with:
          path: ./downloaded
      - run: npm run derive:registry
      - run: npm run generate:summary
        env:
          TEST_RESULTS_GLOBS: |
            test-results/**/*.xml
            downloaded/**/*.xml
            **/junit*.xml
          REQ_MAPPING_FILE: requirements.json
          DISPATCHER_REGISTRY: dispatchers.json
          EVIDENCE_DIR: test-screenshots
