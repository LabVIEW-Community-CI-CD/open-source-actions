name: CI

on:
  push:
    branches: [actions]
  pull_request:

jobs:
  docs-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            docs:
              - 'docs/**'
              - 'README.md'
      - if: steps.changes.outputs.docs == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - if: steps.changes.outputs.docs == 'true'
        name: Lint documentation
        shell: pwsh
        run: scripts/lint-docs.ps1

  node-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm test

  dispatcher-tests:
    name: dispatcher-tests
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Run dispatcher tests
        shell: pwsh
        run: |
          $testPath = Join-Path -Path 'tests/pester' -ChildPath 'Dispatcher.Tests.ps1'
          Invoke-Pester -CI -Path $testPath

  dispatcher-dryrun-tests:
    name: dispatcher-dryrun-tests
    needs: dispatcher-tests
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Run dispatcher dry-run tests
        shell: pwsh
        run: |
          $testPath = Join-Path -Path 'tests/pester' -ChildPath 'Dispatcher.DryRun.Tests.ps1'
          Invoke-Pester -CI -Path $testPath

  scriptpath-tests:
    name: scriptpath-tests
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Run scriptpath tests
        shell: pwsh
        run: |
          $testPath = Join-Path -Path 'tests/pester' -ChildPath 'ScriptPath.Tests.ps1'
          Invoke-Pester -CI -Path $testPath

  deploy-docs:
    if: github.ref == 'refs/heads/actions'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - run: pip install mkdocs
      - run: mkdocs build --strict
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deploy
        uses: actions/deploy-pages@v4
