name: Release

on:
  release:
    types: [published]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run Node tests
        run: npm test

      - name: Install PowerShell 7
        shell: bash
        run: |
          wget -q https://packages.microsoft.com/config/ubuntu/22.04/packages-microsoft-prod.deb
          sudo dpkg -i packages-microsoft-prod.deb
          sudo apt-get update
          sudo apt-get install -y powershell

      - name: Install Pester
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name Pester |
                    Where-Object { $_.Version -ge [Version]'5.0.0' })) {
            Remove-Module Pester -ErrorAction SilentlyContinue
            Install-Module -Name Pester -MinimumVersion 5.0.0 -Scope CurrentUser -Force -SkipPublisherCheck
          }

      - name: Run Pester tests
        shell: pwsh
        run: Invoke-Pester -CI -Path tests/pester

  deploy-docs:
    needs: tests
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: true
    steps:
      - name: Log deploy conditions
        run: |
          echo "ref: ${{ github.ref }}"
          echo "target: ${{ github.event.release.target_commitish }}"
          echo "tests result: ${{ needs.tests.result }}"
      - uses: actions/checkout@v4
        if: github.event.release.target_commitish == 'main'
      - uses: dorny/paths-filter@v2
        if: github.event.release.target_commitish == 'main'
        id: changes
        with:
          filters: |
            docs:
              - 'docs/**'
              - 'README.md'
      - uses: actions/setup-node@v4
        if: github.event.release.target_commitish == 'main' && steps.changes.outputs.docs == 'true'
        with:
          node-version: '20'
      - name: Lint documentation
        if: github.event.release.target_commitish == 'main' && steps.changes.outputs.docs == 'true'
        shell: pwsh
        run: scripts/lint-docs.ps1
      - uses: ./actions/setup-mkdocs
        if: github.event.release.target_commitish == 'main' && steps.changes.outputs.docs == 'true'
      - run: mkdocs build --strict
        if: github.event.release.target_commitish == 'main' && steps.changes.outputs.docs == 'true'
      - uses: actions/upload-artifact@v4
        if: github.event.release.target_commitish == 'main' && steps.changes.outputs.docs == 'true'
        with:
          name: docs-site
          path: site
          if-no-files-found: error
      - uses: actions/upload-pages-artifact@v3
        if: github.event.release.target_commitish == 'main' && steps.changes.outputs.docs == 'true'
        with:
          path: site
      - id: deploy
        uses: actions/deploy-pages@v4
        if: github.event.release.target_commitish == 'main' && steps.changes.outputs.docs == 'true'
