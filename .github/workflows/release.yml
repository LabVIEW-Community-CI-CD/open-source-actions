name: Release

on:
  push:
    branches:
      - actions
      - actions-main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run Node tests
        run: npm test

      - name: Install PowerShell 7
        shell: bash
        run: |
          wget -q https://packages.microsoft.com/config/ubuntu/22.04/packages-microsoft-prod.deb
          sudo dpkg -i packages-microsoft-prod.deb
          sudo apt-get update
          sudo apt-get install -y powershell

      - name: Install Pester
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name Pester |
                    Where-Object { $_.Version -ge [Version]'5.0.0' })) {
            Remove-Module Pester -ErrorAction SilentlyContinue
            Install-Module -Name Pester -MinimumVersion 5.0.0 -Scope CurrentUser -Force -SkipPublisherCheck
          }

      - name: Run Pester tests
        shell: pwsh
        run: Invoke-Pester -CI -Path tests/pester

  release:
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get commit count
        id: commit_count
        run: echo "count=$(git rev-list --count ${GITHUB_REF_NAME})" >> "$GITHUB_OUTPUT"

      - name: Prepare release metadata
        id: release_meta
        env:
          COUNT: ${{ steps.commit_count.outputs.count }}
          BRANCH: ${{ github.ref_name }}
        run: |
          if [ "$BRANCH" = "actions" ]; then
            echo "tag=prerelease-$COUNT" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag=release-$COUNT" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          release_name: ${{ steps.release_meta.outputs.tag }}
          draft: false
          prerelease: ${{ steps.release_meta.outputs.prerelease }}

